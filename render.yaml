services:
  # Backend Service
  - type: web
    name: sesm-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: MONGO_URI
        fromConfig: true # User will provide this in Render dashboard
      - key: JWT_SECRET
        fromConfig: true # User will provide this in Render dashboard
      - key: PORT
        value: 10000

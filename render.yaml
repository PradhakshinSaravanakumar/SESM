# Variables to prompt the user during deployment
variables:
  - key: MONGO_URI
    description: "Your MongoDB Atlas connection string (e.g., mongodb+srv://...)"
  - key: JWT_SECRET
    description: "A secure string for signing JSON Web Tokens"
    generateValue: true

services:
  # Backend Service
  - type: web
    name: sesm-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: MONGO_URI
        fromVariable: MONGO_URI
      - key: JWT_SECRET
        fromVariable: JWT_SECRET
      - key: PORT
        value: 10000
